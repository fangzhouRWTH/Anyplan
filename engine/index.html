<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anyplan — Project Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brandMark">&gt;_</span>
        <div>
          <span class="brandLabel">Anyplan</span>
          <h1 id="projectTitle">Project Dashboard</h1>
        </div>
      </div>
      <div class="topbarActions">
        <label class="selectWrap">
          <span>Instance</span>
          <select id="instanceSelect" aria-label="Guidance instance"></select>
        </label>
        <button id="reloadButton" type="button">Reload</button>
      </div>
      <p id="statusLine" class="statusLine" role="status">Loading…</p>
    </header>

    <main class="layout">
      <aside class="treePanel" aria-label="Project structure">
        <div class="panelHead">
          <h2>Dashboard</h2>
          <input id="filterInput" type="search" placeholder="Filter…" autocomplete="off">
          <p id="indexMeta" class="indexMeta"></p>
        </div>
        <nav id="treeRoot" class="tree"></nav>
      </aside>

      <section class="detailPanel" aria-label="Detail view">
        <header class="detailHead">
          <span id="detailBreadcrumb" class="breadcrumb">Overview</span>
          <span id="detailBadge" class="badge"></span>
        </header>

        <div id="structuredDetail" class="structuredDetail"></div>

        <div id="docSection" class="docSection isCollapsed">
          <div class="docSectionHead">
            <h3>Source document</h3>
            <div class="docActions">
              <code id="docPath" class="docPath"></code>
              <button id="toggleSourceButton" type="button" class="ghostButton" hidden>
                Show markdown
              </button>
            </div>
          </div>
          <article id="docContent" class="docContent">
            <p class="placeholder">Structured summary is shown above. Open the markdown source only when you need the full file.</p>
          </article>
        </div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
